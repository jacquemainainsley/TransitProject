<!DOCTYPE html>
<html>
<head>
<title>Exoplanet Photon Explorer</title>
</head>
<body>

<h1> Exoplanet Photon Explorer</h1>

<label for="planet">Choose a planet:</label>
<select id="planet"></select>

<h2>Results:</h2>
<div id="results"></div>

<script>
let data = [];

// Load CSV
fetch('photoncountdata.csv')
.then(response => response.text())
.then(text => {
let rows = text.split('\n').slice(1);
rows.forEach(row => {
let [planet, gas, m1, m2] = row.split(',');
data.push({planet, gas, m1, m2});
});

populateDropdown();
});

function populateDropdown() {
let planets = [...new Set(data.map(d => d.planet))];
let dropdown = document.getElementById("planet");

planets.forEach(p => {
let option = document.createElement("option");
option.value = p;
option.text = p;
dropdown.add(option);
});

dropdown.addEventListener("change", updateResults);
}

function updateResults() {
let selected = document.getElementById("planet").value;
let filtered = data.filter(d => d.planet === selected);

let html = "<table border='1'><tr><th>Gas</th><th>Method 1</th><th>Method 2</th></tr>";

filtered.forEach(d => {
html += `<tr><td>${d.gas}</td><td>${d.m1}</td><td>${d.m2}</td></tr>`;
});

html += "</table>";

document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
